<!doctype html>
<html>
  <head>
    <title>Referrer Page (With JWT)</title>

    <!-- ================= JWT LOADER (WAJIB DI ATAS) ================= -->
    <script>
      // fetch JWT dari backend
      async function loadImpactJWT() {
        try {
          const res = await fetch('/impact/jwt'); // endpoint backend lu
          const data = await res.json();

          window.impactToken = data.token;

          console.log('✅ JWT loaded');
        } catch (err) {
          console.error('❌ Failed load JWT', err);
        }
      }
    </script>

    <!-- ================= UTT ================= -->
    <script>
      (function (a, b, c, d, e, f, g) {
        e['ire_o'] = c;
        e[c] =
          e[c] ||
          function () {
            (e[c].a = e[c].a || []).push(arguments);
          };
        f = d.createElement(b);
        g = d.getElementsByTagName(b)[0];
        f.async = 1;
        f.src = a;
        g.parentNode.insertBefore(f, g);
      })(
        'https://utt.impactcdn.com/A6072491-e363-40fa-8208-09e20a42353865535.js',
        'script',
        'ire',
        document,
        window,
      );
    </script>
  </head>

  <body>
    <h2>👤 Referrer (User A - VERIFIED)</h2>

    <p>Status JWT: <span id="jwtStatus">Loading...</span></p>

    <!-- ================= WIDGET ================= -->
    <impact-popup widget="p/32011/w/referrerWidget">
      <button>Open Referral Widget</button>
    </impact-popup>

    <p>👉 Copy link dari widget → buka di incognito → lanjut ke friend.html</p>

    <script>
      /* ================= INIT ================= */

      (async function init() {
        await loadImpactJWT();

        // kasih indikator UI
        if (window.impactToken) {
          document.getElementById('jwtStatus').innerText = 'READY ✅';
        } else {
          document.getElementById('jwtStatus').innerText = 'FAILED ❌';
        }
      })();
    </script>
  </body>
</html>
