<!doctype html>
<html>
  <head>
    <title>Friend Page</title>

    <!-- UTT -->
    <script>
      (function (a, b, c, d, e, f, g) {
        e['ire_o'] = c;
        e[c] =
          e[c] ||
          function () {
            (e[c].a = e[c].a || []).push(arguments);
          };
        f = d.createElement(b);
        g = d.getElementsByTagName(b)[0];
        f.async = 1;
        f.src = a;
        g.parentNode.insertBefore(f, g);
      })(
        'https://utt.impactcdn.com/A6072491-e363-40fa-8208-09e20a42353865535.js',
        'script',
        'ire',
        document,
        window,
      );
    </script>
  </head>

  <body>
    <h2>🧑 Referred User (User B)</h2>

    <!-- ================= REGISTER FORM ================= -->
    <h3>Register</h3>

    <form id="registerForm">
      <input
        type="text"
        id="firstName"
        placeholder="First Name"
        required
      /><br /><br />
      <input
        type="text"
        id="lastName"
        placeholder="Last Name"
        required
      /><br /><br />
      <input type="email" id="email" placeholder="Email" required /><br /><br />

      <label>Referral Code (rsCode)</label><br />
      <input type="text" id="rsCode" readonly /><br /><br />

      <button type="submit">Register</button>
    </form>

    <hr />

    <button onclick="doConversion()">Simulate Conversion</button>

    <hr />

    <h3>Debug</h3>
    <p>_saasquatch: <span id="sq"></span></p>

    <script>
      /* ================= UTILS ================= */

      function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
      }

      async function sha1(str) {
        const buf = new TextEncoder().encode(str);
        const hash = await crypto.subtle.digest('SHA-1', buf);
        return Array.from(new Uint8Array(hash))
          .map((b) => b.toString(16).padStart(2, '0'))
          .join('');
      }

      /* ================= CAPTURE REFERRAL ================= */

      function captureReferral() {
        const sq = getParam('_saasquatch');
        const rsCode = getParam('rsCode');

        if (sq) localStorage.setItem('_saasquatch', sq);
        if (rsCode) localStorage.setItem('rsCode', rsCode);

        document.getElementById('sq').innerText =
          localStorage.getItem('_saasquatch') || '-';

        document.getElementById('rsCode').value =
          localStorage.getItem('rsCode') || '';
      }

      /* ================= REGISTER ================= */

      document
        .getElementById('registerForm')
        .addEventListener('submit', function (e) {
          e.preventDefault();

          const user = {
            email: document.getElementById('email').value,
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
          };
          const rsCode = localStorage.getItem('rsCode');
          const jwt = localStorage.getItem('_saasquatch');

          console.log('refered Code: ' + rsCode);
          const payload = {
            user: {
              id: user.email,
              accountId: user.email,
              email: user.email,
              firstName: user.firstName,
              lastName: user.lastName,
              referredByCodes: [rsCode],
            },
            jwt,
          };
          console.log(payload);

          console.log('Registering user:', user);

          window.impactOnReady = function () {
            impact
              .api()
              .upsertUser(payload)
              .then((res) => console.log('✅ Registered', res))
              .catch((err) => console.error(err));
          };
        });

      /* ================= CONVERSION ================= */

      async function doConversion() {
        const email = document.getElementById('email').value;

        if (!email) {
          alert('Isi email dulu bro!');
          return;
        }

        const hashed = await sha1(email);
        const rsCode = localStorage.getItem('rsCode');
        const payload = {
          orderId: 'ORDER-' + Date.now(),
          customerId: email,
          customerEmail: hashed,
          customerStatus: 'NEW',
          currencyCode: 'USD',
          customerCountry: 'US',
          orderPromoCode: rsCode || '',
          orderDiscount: 0,
          items: [
            {
              subTotal: 50,
              category: 'Demo',
              sku: 'sku-1',
              quantity: 1,
              name: 'Demo Product',
            },
          ],
        };

        console.log(payload);
        ire('trackConversion', 54063, payload, {
          verifySiteDefinitionMatch: true,
        });

        console.log('✅ Conversion fired');
      }

      /* ================= INIT ================= */

      captureReferral();
    </script>
  </body>
</html>
