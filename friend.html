<!doctype html>
<html>
  <head>
    <title>Referred User (Friend)</title>
    <meta charset="UTF-8" />
  </head>

  <body>
    <h2>👥 Referred User (Friend Page)</h2>

    <!-- ================= HOST CONFIG ================= -->
    <div>
      <label>Backend Host URL</label><br />
      <input
        type="text"
        id="hostUrl"
        placeholder="http://localhost:3000"
        style="width: 320px"
      />
      <br /><br />
      <button onclick="setLocal()">Set URL</button>
    </div>

    <hr />

    <!-- ================= FORM ================= -->
    <form id="registerForm">
      <div>
        <label>Email</label><br />
        <input type="email" id="email" required />
      </div>

      <div>
        <label>First Name</label><br />
        <input type="text" id="firstName" />
      </div>

      <div>
        <label>Last Name</label><br />
        <input type="text" id="lastName" />
      </div>

      <div>
        <label>Referral Code</label><br />
        <input type="text" id="rsCode" readonly />
      </div>

      <br />
      <button type="submit">Register</button>
    </form>

    <br />

    <!-- ================= CONVERSION ================= -->
    <button onclick="doConversion()">Simulate Purchase</button>

    <hr />

    <h3>Debug</h3>
    <pre id="debug"></pre>

    <!-- ================= SCRIPT ================= -->
    <script>
      /* ================= LOGGER ================= */
      function log(msg, data) {
        console.log(msg, data || '');
        document.getElementById('debug').innerText =
          msg + '\n' + JSON.stringify(data || {}, null, 2);
      }

      /* ================= HOST CONFIG ================= */

      function getBaseUrl() {
        const input = document.getElementById('hostUrl')?.value?.trim();

        if (input) {
          localStorage.setItem('impact_host', input);
          return input;
        }

        return localStorage.getItem('impact_host') || window.location.origin;
      }

      function setLocal() {
        document.getElementById('hostUrl').value = 'http://localhost:3000';
      }

      function setProd() {
        document.getElementById('hostUrl').value = 'https://api.satuakun.id';
      }

      /* ================= UTILS ================= */

      function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
      }

      async function sha1(str) {
        const buf = new TextEncoder().encode(str);
        const hash = await crypto.subtle.digest('SHA-1', buf);
        return Array.from(new Uint8Array(hash))
          .map((b) => b.toString(16).padStart(2, '0'))
          .join('');
      }

      function loadUTT() {
        return new Promise((resolve) => {
          (function (a, b, c, d, e, f, g) {
            e['ire_o'] = c;
            e[c] =
              e[c] ||
              function () {
                (e[c].a = e[c].a || []).push(arguments);
              };

            window.impactOnReady = function () {
              resolve();
            };

            f = d.createElement(b);
            g = d.getElementsByTagName(b)[0];
            f.async = 1;
            f.src = a;
            g.parentNode.insertBefore(f, g);
          })(
            'https://utt.impactcdn.com/A6072491-e363-40fa-8208-09e20a42353865535.js',
            'script',
            'ire',
            document,
            window,
          );
        });
      }

      /* ================= REFERRAL ================= */

      function captureReferral() {
        const rsCode = getParam('rsCode');

        if (rsCode) {
          localStorage.setItem('rsCode', rsCode);
        }

        const saved = localStorage.getItem('rsCode');

        const input = document.getElementById('rsCode');
        if (input) input.value = saved || '';
      }

      /* ================= REGISTER ================= */

      async function doRegister(e) {
        e.preventDefault();

        const email = document.getElementById('email')?.value;
        const firstName = document.getElementById('firstName')?.value;
        const lastName = document.getElementById('lastName')?.value;

        if (!email) {
          alert('Email wajib diisi');
          return;
        }

        const rsCode = localStorage.getItem('rsCode');

        const user = {
          email,
          firstName,
          lastName,
          referredByCodes: rsCode ? [rsCode] : [],
        };

        try {
          const baseUrl = getBaseUrl();

          log('🚀 Register → ' + baseUrl, user);

          const res = await fetch(`${baseUrl}/impact/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(user),
          });

          const data = await res.json();

          if (!data.success) throw new Error(data.message);

          window.impactToken = data.token;

          log('✅ JWT received');

          await loadUTT();

          log('✅ Impact ready');

          const payload = {
            user: {
              id: email,
              accountId: email,
              email,
              firstName,
              lastName,
              referredByCodes: user.referredByCodes,
            },
          };

          const resImpact = await impact.api().upsertUser(payload);

          log('✅ Registered to Impact', resImpact);

          alert('Register sukses 🚀');
        } catch (err) {
          console.error(err);
          log('❌ Error', err.message);
          alert('Register gagal');
        }
      }

      /* ================= CONVERSION ================= */

      async function doConversion() {
        const email = document.getElementById('email')?.value;

        if (!email) {
          alert('Isi email dulu!');
          return;
        }

        const hashed = await sha1(email);
        const rsCode = localStorage.getItem('rsCode');

        const payload = {
          orderId: 'ORDER-' + Date.now(),
          customerId: email,
          customerEmail: hashed,
          orderPromoCode: rsCode || '',
          currencyCode: 'USD',
          items: [
            {
              subTotal: 50,
              sku: 'sku-1',
              quantity: 1,
              name: 'Demo Product',
            },
          ],
        };

        log('🛒 Conversion', payload);

        ire('trackConversion', 54063, payload, {
          verifySiteDefinitionMatch: true,
        });

        alert('Conversion fired 🚀');
      }

      /* ================= INIT ================= */

      document.addEventListener('DOMContentLoaded', () => {
        captureReferral();

        // load saved host
        const savedHost = localStorage.getItem('impact_host');
        if (savedHost) {
          document.getElementById('hostUrl').value = savedHost;
        }

        const form = document.getElementById('registerForm');
        if (form) {
          form.addEventListener('submit', doRegister);
        }
      });
    </script>
  </body>
</html>
